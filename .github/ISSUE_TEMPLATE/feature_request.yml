name: 功能建议 / Feature request
description: 提出新功能或改进方案
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        提议新功能前，建议先看下 [docs/ROADMAP.md](https://github.com/Yuuqq/TheBigPromptLibrary/blob/main/docs/ROADMAP.md)，避免重复。
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题 / What problem are you trying to solve?
      description: 描述用户需求或痛点（不是先写解决方案）
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 你设想的解决方案 / Proposed solution
      description: 越具体越好。如果有 UI mockup 或交互细节，欢迎附上。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过哪些替代方案 / Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: 范围
      options:
        - 网站前端
        - 翻译流水线
        - 数据/索引
        - 部署/运维
        - 其他
    validations:
      required: true
  - type: checkboxes
    id: contribute
    attributes:
      label: 你愿意参与实现吗？
      options:
        - label: 我可以提交 PR
        - label: 我可以帮忙测试
        - label: 我只是想提建议
