name: Sync upstream and auto-translate

on:
  schedule:
    # Daily at 03:00 UTC (11:00 Beijing time)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      max_files:
        description: 'Max files to translate this run'
        default: '40'
        required: false

permissions:
  contents: write

concurrency:
  group: sync-translate
  cancel-in-progress: false

jobs:
  sync_translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream (0xeb/TheBigPromptLibrary)
        env:
          UPSTREAM_REPO: 0xeb/TheBigPromptLibrary
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_upstream.py

      - name: Translate new/changed files via GLM
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_MODEL: glm-z1-flash
          MAX_FILES_PER_RUN: ${{ github.event.inputs.max_files || '40' }}
        run: python scripts/translate.py

      - name: Rebuild prompts_index.json
        run: python scripts/build_index.py

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            COUNT_NEW=$(git diff --cached --name-only --diff-filter=A | wc -l)
            COUNT_MOD=$(git diff --cached --name-only --diff-filter=M | wc -l)
            git commit -m "chore: auto-sync upstream + translate ($(date -u +%Y-%m-%d))" \
                       -m "新增 ${COUNT_NEW} 个文件，更新 ${COUNT_MOD} 个文件"
            git push
          fi
