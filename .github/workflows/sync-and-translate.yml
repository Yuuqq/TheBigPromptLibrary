name: Sync upstream and auto-translate

on:
  schedule:
    # Daily at 03:00 UTC (11:00 Beijing time)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      max_files:
        description: 'Max files to translate this run'
        default: '40'
        required: false
      retranslate_older_than:
        description: 'Force re-translate files older than YYYY-MM-DD (leave blank to skip)'
        default: ''
        required: false

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-translate
  cancel-in-progress: false

jobs:
  sync_translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream (0xeb/TheBigPromptLibrary)
        env:
          UPSTREAM_REPO: 0xeb/TheBigPromptLibrary
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_upstream.py

      - name: Translate new/changed files via GLM
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_MODEL: glm-z1-flash
          MAX_FILES_PER_RUN: ${{ github.event.inputs.max_files || '40' }}
          RETRANSLATE_OLDER_THAN: ${{ github.event.inputs.retranslate_older_than || '' }}
        run: python scripts/translate.py

      - name: Rebuild prompts_index.json
        run: python scripts/build_index.py

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            COUNT_NEW=$(git diff --cached --name-only --diff-filter=A | wc -l)
            COUNT_MOD=$(git diff --cached --name-only --diff-filter=M | wc -l)
            git commit -m "chore: auto-sync upstream + translate ($(date -u +%Y-%m-%d))" \
                       -m "新增 ${COUNT_NEW} 个文件，更新 ${COUNT_MOD} 个文件"
            # Retry push up to 3 times in case a human commit lands during the run
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                exit 0
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
            echo "All push attempts failed" >&2
            exit 1
          fi

      - name: Notify on failure (open or comment GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const titlePrefix = 'Sync/translate workflow failed';
            const body = [
              `**自动同步/翻译工作流执行失败**`,
              ``,
              `- 失败时间: ${today}`,
              `- 运行链接: ${runUrl}`,
              `- 提交 SHA: \`${context.sha.slice(0, 7)}\``,
              ``,
              `请前往运行链接查看具体哪一步失败（sync / translate / build_index / push）。`,
              ``,
              `> 此 Issue 由 \`.github/workflows/sync-and-translate.yml\` 在失败时自动创建。`,
              `> 修复后请手动关闭。下次失败时如本 Issue 仍开启，机器人会在此追加评论而非新建。`,
            ].join('\n');

            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${titlePrefix}"`,
            });

            if (search.data.total_count > 0) {
              const issue = search.data.items[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `### 又一次失败 (${today})\n${body}`,
              });
              core.notice(`Appended failure comment to issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${titlePrefix} (${today})`,
                body,
                labels: ['workflow-failure', 'automated'],
              });
              core.notice(`Opened failure issue #${created.data.number}`);
            }
